{% extends "base.html" %}
{% block title %}Register — LMPTS{% endblock %}
{% block guest_content %}
<div class="auth-page">
  <div class="auth-card">
    <h1>Create your account</h1>
    <p class="subtitle">Learner registrations require admin approval before you can log in.</p>
    <form method="post">
      <div class="form-group">
        <label for="full_name">Full name</label>
        <input type="text" id="full_name" name="full_name" value="{{ form.get('full_name', '') }}" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ form.get('email', '') }}" required>
      </div>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" value="{{ form.get('username', '') }}" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" minlength="8" required>
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm password</label>
        <input type="password" id="confirm_password" name="confirm_password" minlength="8" required>
      </div>
      <button type="submit" class="btn" style="width:100%">Register</button>
    </form>
    <p class="footer-link"><a href="{{ url_for('auth.login') }}">Back to login</a></p>
  </div>
</div>
{% endblock %}
